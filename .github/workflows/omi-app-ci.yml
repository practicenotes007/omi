name: OMI App CI (Test + Build)

on:
  push:
    paths:
      - 'adhoc_jobs/omi/app/**'
      - '.github/workflows/omi-app-ci.yml'
  pull_request:
    paths:
      - 'adhoc_jobs/omi/app/**'
      - '.github/workflows/omi-app-ci.yml'
  workflow_dispatch:

jobs:
  # ============================================================
  # Job 1: Flutter 单元测试
  # ============================================================
  test:
    name: Flutter Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: adhoc_jobs/omi/app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.3'
          channel: 'stable'
          cache: true

      - name: Setup Firebase prebuilt configs
        run: |
          mkdir -p android/app/src/dev/ android/app/src/prod/
          cp setup/prebuilt/firebase_options.dart lib/firebase_options_dev.dart
          cp setup/prebuilt/google-services.json android/app/src/dev/
          cp setup/prebuilt/firebase_options.dart lib/firebase_options_prod.dart
          cp setup/prebuilt/google-services.json android/app/src/prod/

      - name: Create .dev.env
        run: |
          echo "API_BASE_URL=https://api.omiapi.com/" > .dev.env
          echo "USE_WEB_AUTH=true" >> .dev.env
          echo "USE_AUTH_CUSTOM_TOKEN=true" >> .dev.env

      - name: Flutter pub get
        run: flutter pub get

      - name: Run build_runner (code generation)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run Flutter tests
        run: flutter test --reporter expanded

  # ============================================================
  # Job 2: 构建 Android Debug APK
  # ============================================================
  build-android:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: adhoc_jobs/omi/app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.3'
          channel: 'stable'
          cache: true

      - name: Install Android NDK
        run: |
          NDK_VERSION="28.2.13676358"
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -f "$SDKMANAGER" ]; then
            SDKMANAGER="${ANDROID_HOME}/tools/bin/sdkmanager"
          fi
          yes | $SDKMANAGER --install "ndk;${NDK_VERSION}" --channel=3 || true

      - name: Create local.properties
        working-directory: adhoc_jobs/omi/app/android
        run: |
          echo "flutter.sdk=${FLUTTER_ROOT}" > local.properties
          echo "sdk.dir=${ANDROID_HOME}" >> local.properties

      - name: Setup Firebase prebuilt configs
        run: |
          mkdir -p android/app/src/dev/ android/app/src/prod/
          cp setup/prebuilt/firebase_options.dart lib/firebase_options_dev.dart
          cp setup/prebuilt/google-services.json android/app/src/dev/
          cp setup/prebuilt/firebase_options.dart lib/firebase_options_prod.dart
          cp setup/prebuilt/google-services.json android/app/src/prod/

      - name: Create .dev.env (point to staging/proxy)
        run: |
          echo "API_BASE_URL=${{ vars.API_BASE_URL || 'https://api.omiapi.com/' }}" > .dev.env
          echo "USE_WEB_AUTH=true" >> .dev.env
          echo "USE_AUTH_CUSTOM_TOKEN=true" >> .dev.env

      - name: Copy debug keystore
        run: cp setup/prebuilt/key.properties android/

      - name: Flutter pub get
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build debug APK
        run: flutter build apk --debug --flavor dev

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: omi-dev-debug
          path: adhoc_jobs/omi/app/build/app/outputs/flutter-apk/app-dev-debug.apk
          retention-days: 30

      - name: APK info
        run: |
          echo "📱 APK built successfully"
          ls -lh build/app/outputs/flutter-apk/app-dev-debug.apk
