name: Android Debug Build

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Android Debug APK (dev flavor)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Install Android NDK
        run: |
          NDK_VERSION="28.2.13676358"
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -f "$SDKMANAGER" ]; then
            SDKMANAGER="${ANDROID_HOME}/tools/bin/sdkmanager"
          fi
          yes | $SDKMANAGER --install "ndk;${NDK_VERSION}" --channel=3 || true
          echo "NDK_VERSION=${NDK_VERSION}" >> $GITHUB_ENV

      - name: Create local.properties
        working-directory: ./app/android
        run: |
          echo "flutter.sdk=${FLUTTER_ROOT}" > local.properties
          echo "sdk.dir=${ANDROID_HOME}" >> local.properties

      - name: Setup Firebase prebuilt configs
        run: |
          mkdir -p android/app/src/dev/ android/app/src/prod/
          cp setup/prebuilt/firebase_options.dart lib/firebase_options_dev.dart
          cp setup/prebuilt/google-services.json android/app/src/dev/
          cp setup/prebuilt/firebase_options.dart lib/firebase_options_prod.dart
          cp setup/prebuilt/google-services.json android/app/src/prod/

      - name: Create .dev.env
        run: |
          echo "API_BASE_URL=https://api.omiapi.com/" > .dev.env
          echo "USE_WEB_AUTH=true" >> .dev.env
          echo "USE_AUTH_CUSTOM_TOKEN=true" >> .dev.env

      - name: Copy debug keystore
        run: cp setup/prebuilt/key.properties android/

      - name: Flutter pub get
        run: flutter pub get

      - name: Run build_runner (code generation)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build debug APK
        run: flutter build apk --debug --flavor dev

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: omi-dev-debug
          path: app/build/app/outputs/flutter-apk/app-dev-debug.apk
          retention-days: 30
